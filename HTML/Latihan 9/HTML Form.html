<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>HTML Form</title>
</head>

<body>
<form>
	<label for="username">Username :</label>
	<input type="text" id="username">
	<br><br>
	<label for="password">Password :</label>
	<input type="password"	id="password">
	<br><br><br>
	<label for="jenis kelamin">Jenis Kelamin:</label>
	<br><br><br>
	<label for="pria">Pria</label><input type="radio" id="pria" name="jenis kelamin">
	<label for="wanita">Wanita</label><input type="radio" id="wanita" name="jenis kelamin">
	<br><br><br>
	<label>Hobby :</label>
	<br><br>
	<label for="olahraga">Olahraga</label><input type="checkbox" id="olahraga" name="">
	<label for="menyanyi">Menyanyi</label><input type="checkbox" id="menyanyi" name="">
	<label for="traveling">Traveling</label><input type="checkbox" id="traveling" name="">
	<br>
	<label for="membaca">Membaca</label><input type="checkbox" id="membaca" name="">
	<label for="meditasi">Meditasi</label><input type="checkbox" id="meditasi" name="">
	<label for="riding">Riding</label><input type="checkbox" id="riding" name="">
	<br><br>
	<label>Pilihan Kelas :</label>
	<select>
		<option>Jakarta</option>
		<option>BSD</option>
		<option>Yogyakarta</option>
		<option>Bandung</option>
		<option>Surabaya</option>
	</select>
	<br><br>
	<label>Kritik dan Saran :</label>
	<br><br>
	<textarea></textarea>
	<br>
	<button type="submit">Kirim</button>
</form>

</body>
</html>
