<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>FORM EXERCISE</title>
</head>
<body>
<table border="0" cellspacing="0" cellpadding="5" align="center">
	<!-- ROW 1 -->
	<tr>
		<td align="right">
			<label for="text">Text:</label>
		</td>
		<td>
			<input type="text" id="text">
		</td>
	</tr>
	<!-- ROW 1 END -->
	<!-- ROW 2 -->
	<tr>
		<td align="right">
			<label for="password">Password:</label>
		</td>
		<td>
			<input type="password" id="password">
		</td>
	</tr>
	<!-- ROW 2 END -->
	<!-- ROW 3 -->
	<tr>
		<td colspan="2" align="center">
			<label for="radio1">Radio 1</label><input type="radio" id="radio1" name="radioradio">
			<label for="radio2">Radio 2</label><input type="radio" id="radio2" name="radioradio">
		</td>
	</tr>
	<!-- ROW 3 END -->
	<!-- ROW 4 -->
	<tr>
		<td colspan="2" align="center">
			<label for="checkbox1">checkbox 1</label><input type="checkbox" id="checkbox1">
			<label for="checkbox2">checkbox 2</label><input type="checkbox" id="checkbox2">
		</td>
	</tr>
	<!-- ROW 4 END -->
	<!-- ROW 5 -->
	<tr>
		<td align="right">
			<label>Combo Box :</label>
		</td>
		<td>
			<select>
				<option>Option 1</option>
				<option>Option 2</option>
				<option>Option 3</option>
			</select>
		</td>
	</tr>
	<!-- ROW 5 END -->
	<!-- ROW 6 -->
	<tr>
		<td align="right">
			<label>Textarea :</label>
		</td>
		<td>
			<input type="Textarea" name="">
		</td>
	</tr>
	<!-- ROW 6 END -->
	<!-- ROW 7 -->
	<tr>
		<td colspan="2" align="center">
			<button type="submit">Button</button>
		</td>
	</tr>
	<!-- ROW 7 END -->
</table>
</body>
</html>
