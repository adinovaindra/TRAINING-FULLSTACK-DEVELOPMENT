<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>HTML Paragraf</title>
</head>
<body>

<!-- contoh tag p,br,b,i,u,strong,em -->

<p>ini adalah paragraf 1</p>
<hr>
<p>ini adalah paragraf 2</p>

<p><b>ini</b> <i>adalah</i> <u>paragraf 3</u></p>

<p><strong>ini adalah</strong> <em>paragraf 4</em></p>

</body>
</html>
